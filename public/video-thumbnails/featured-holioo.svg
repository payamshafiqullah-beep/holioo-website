<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Holioo featured film poster</title>
  <desc id="desc">Warm cinematic abstract poster for a family film video placeholder.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#171411"/>
      <stop offset="0.55" stop-color="#475b53"/>
      <stop offset="1" stop-color="#c6a66e"/>
    </linearGradient>
    <radialGradient id="glow" cx="38%" cy="28%" r="55%">
      <stop stop-color="#fffaf3" stop-opacity="0.7"/>
      <stop offset="0.42" stop-color="#c6a66e" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#171411" stop-opacity="0"/>
